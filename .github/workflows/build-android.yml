name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔑 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build database
        run: |
          # 确保 better-sqlite3 原生模块已编译安装
          npm rebuild better-sqlite3 || npm install better-sqlite3 --legacy-peer-deps
          node -e "require('better-sqlite3'); console.log('✓ better-sqlite3 OK')"
          npm run generate-db

      - name: 💾 Stage database for EAS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f assets/pocket_poem.db
          git commit -m "chore: add generated db for build" || echo "nothing to commit"

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗️ Build APK with EAS
        run: eas build --platform android --non-interactive --no-wait

      - name: 🔗 Create Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
